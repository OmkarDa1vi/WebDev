<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node File Manager</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; line-height: 1.6; }
        .card { border: 1px solid #ddd; padding: 20px; border-radius: 8px; box-shadow: 2px 2px 10px #eee; }
        iframe { width: 100%; height: 150px; border: 1px inset #ccc; margin-top: 10px; }
        .btn { display: inline-block; background: #007bff; color: white; padding: 10px 15px; text-decoration: none; border-radius: 4px; border: none; cursor: pointer; }
        .btn-download { background: #28a745; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>1. Upload a Text File</h2>
        <form action="/upload" method="POST" enctype="multipart/form-data">
            <input type="file" name="fileToUpload" accept=".txt" required>
            <button type="submit" class="btn">Upload</button>
        </form>

        <hr>

        <h2>2. File Preview</h2>
        <p>Current content of <code>file1.txt</code>:</p>
        <iframe src="/view-file"></iframe>

        <hr>

        <h2>3. Action</h2>
        <a href="/download-file" class="btn btn-download">Download This File</a>
    </div>

</body>
</html>
